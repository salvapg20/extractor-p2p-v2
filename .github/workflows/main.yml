name: P2P Extractor 24-7

on:
  schedule:
    - cron: '*/5 * * * *' # Esto lo ejecuta cada 5 minutos
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install pandas requests
        
     - name: Ejecutar script
        run: |
          echo "Listando archivos actuales:"
          ls -F
          python3 extractor.py

      - name: Guardar cambios en el CSV
        run: |
          git config --local user.email "accion@github.com"
          git config --local user.name "Bot P2P"
          git add precios_p2p.csv
          git commit -m "Actualización automática de datos" || echo "No hay cambios"
          git push
